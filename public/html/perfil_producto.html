<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Store</title>
  <link rel="shortcut icon" href="../img/index/logoVarianteSmall.png" type="image/x-icon">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/bootstrap-5.3.3-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/normalized.css">
</head>
<body>
  <!-- whatsapp flotante -->
  <div id="wa-button">
    <a href="https://api.whatsapp.com/send?phone=8717843809" target="_blank">
      <img src="../img/index/whatsappFloat.svg" alt="Contáctanos por WhatsApp">
    </a>
  </div>
    <!-- barra superior -->
    <div class="container blue">
      <div class="navbar-top">
          <div class="social-link">
              <a href="https://api.whatsapp.com/send?phone=8717843809" target="_blank" ><img src="../img/index/whatsapp.svg" alt="" width="30px"></a>
              <a href="https://www.facebook.com/profile.php?id=100064181314031" target="_blank"><img src="../img/index/facebook.svg" alt="" width="30px"></a>
              <a href="https://www.instagram.com/glassstoretrc?igsh=MXVhdHh1MDVhOGxzeA==" target="_blank"><img src="../img/index/instagram.svg" alt="" width="30px"></a>
          </div>
          <div class="logo">
              <img src="../img/index/GLASS.png" alt="" class="logo">
          </div>
          <div class="icons">
              <a href="./products.html"><img src="../img/index/search.svg" alt="" width="20px" ></a>
              <img src="../img/index/favorites.svg" alt="" width="20px" style="cursor: pointer">
              <img src="../img/index/user.svg" alt="" width="25px" id="user-icon" style="cursor: pointer">
              <div class="login-form" id="login-form">
                  <h6>Iniciar Sesión</h6>
                  <form action="/login">
                    <input type="email" placeholder="Correo" required name="correo" id="correo">
                    <input type="password" placeholder="Contraseña" required name="contraseña" id="contraseña">
                    <p class="pop-login-p">¿No tienes cuenta?</p>
                    <p class="space-cero"><a href="../html/register.html"  class="pop-login-create">Crea una</a> </p>
                    <button type="submit">Aceptar</button>
                  </form>

              </div>
          </div>
      </div>
  </div>
    <!-- segunda barra -->
    <nav class="navbar sticky-top navbar-expand-md" id="navbar-color">
      <div class="container">
          <!-- menú hamburguesa -->
          <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar">
              <span><i><img src="../img/index/menu.svg" alt="Menu" width="30px"></i></span>
          </button>
  
          <div class="offcanvas offcanvas-start" id="offcanvasNavbar">
              <div class="offcanvas-header">
                  <h5 class="offcanvas-title">Menú</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
              </div>
              <div class="offcanvas-body">
                  <ul class="navbar-nav">
                      <li class="nav-item ">
                          <a class="nav-link" href="./index.html" >Inicio</a>
                      </li>
                      <li class="nav-item">
                          <a class="nav-link nav-left" href="./products.html">Productos</a>
                      </li>
                      <li class="nav-item">
                        <a class="nav-link nav-left" href="https://api.whatsapp.com/send?phone=8717843809" target="_blank">Contacto</a>
                      </li>
                      <li class="nav-item">
                          <a class="nav-link nav-left" href="./citas.html">Agendar</a>
                      </li>
                      
                  </ul>
              </div>
          </div>
      </div>
    </nav>

    <!--Perfil del producto-->
    <div class="container mt-5" id="product-profile">
      <div class="row">
          <div class="col-md-6">
              <img id="product-imag" src="../img/index/barandalBalconCafe.jpeg" alt="Imagen del Producto" class="img-fluid">
          </div>
          <div class="col-md-6">
              <h1 id="product-name">Nombre del Producto</h1>
              <p id="product-description">Descripción del Producto</p>
              <p id="product-price">Precio del Producto</p>
          </div>
      </div>
  </div>



</body>
</html>
